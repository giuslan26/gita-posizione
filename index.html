<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invio posizione gita</title>
</head>
<body>
  <h2>Invio posizione attivo</h2>
  <p>Lascia questa pagina aperta durante la gita.</p>

  <script>
    const endpoint = "https://script.google.com/macros/s/AKfycbytcl-b-qNM0kKzNQBl47Y4LBpfa-3NDKip2gMxm-mvqo8_kaolyMluXU69MPR-jec8pw/exec";

    function sendPosition() {
      if (!navigator.geolocation) {
        alert("La geolocalizzazione non è supportata dal tuo dispositivo.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              lat: pos.coords.latitude,
              lon: pos.coords.longitude
            })
          });
        },
        err => {
          console.log("Errore geolocalizzazione:", err);
        }
      );
    }

    // invia la posizione ogni 15 minuti
    setInterval(sendPosition, 900000);
    sendPosition();
  </script>
</body>
</html>
