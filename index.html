<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invio posizione gita</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 300px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <h2>Invio posizione attivo</h2>
  <p>Lascia questa pagina aperta durante la gita.</p>

  <div id="map"></div>

  <h3>Invia un messaggio</h3>
  <input type="text" id="msgInput" placeholder="Scrivi un messaggio..." />
  <button onclick="sendMessage()">Invia messaggio</button>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const endpoint = "https://script.google.com/macros/s/AKfycbza0UEaGar4myCLEjXYdrKJvu-nf_S0H3ioEH5Bek40oYNVYMwDkktqhD_0x-8vgLqUXA/exec";
// Icona bus personalizzata
const busIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/2972/2972185.png",
  iconSize: [40, 40],
  iconAnchor: [20, 20]
});
    let map = L.map('map').setView([44.9, 8.2], 13);
    let marker = L.marker([44.9, 8.2], { icon: busIcon }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    function updateMap(lat, lon) {
      marker.setLatLng([lat, lon]);
      map.setView([lat, lon], 15);
    }

    function sendPosition() {
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        updateMap(lat, lon);

        const fd = new FormData();
        fd.append("lat", lat);
        fd.append("lon", lon);

        fetch(endpoint, { method: "POST", body: fd });
      });
    }

    function sendMessage() {
      const msg = document.getElementById("msgInput").value;
      if (!msg) return;

      const fd = new FormData();
      fd.append("msg", msg);

      fetch(endpoint, { method: "POST", body: fd });

      document.getElementById("msgInput").value = "";
    }

    setInterval(sendPosition, 900000);
    sendPosition();
  </script>
</body>
</html>
