<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invio posizione gita</title>
</head>
<body>
  <h2>Invio posizione attivo</h2>
  <p>Lascia questa pagina aperta durante la gita.</p>

  <script>
    const endpoint = "https://script.google.com/macros/s/AKfycbyLNV10VJVNw7kRxdfKm7i237W_nxathKi8APArJngAXZADRMASap9T1jU2BkND8ZmeUg/exec";

    function sendPosition() {
      if (!navigator.geolocation) {
        alert("La geolocalizzazione non è supportata dal tuo dispositivo.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
         const fd = new FormData();
fd.append("lat", pos.coords.latitude);
fd.append("lon", pos.coords.longitude);

fetch(endpoint, {
  method: "POST",
  body: fd
});
        },
        err => {
          console.log("Errore geolocalizzazione:", err);
        }
      );
    }

    // invia la posizione ogni 15 minuti
    setInterval(sendPosition, 900000);
    sendPosition();
  </script>
</body>
</html>
